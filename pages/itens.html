<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Gerencie seus itens de compras" />
    <meta name="theme-color" content="#10b981" />
    <title>Itens - Lista de Compras</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/navbar.css" />
    <link rel="stylesheet" href="../css/components.css" />

    <link rel="manifest" href="../manifest.json" />
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  </head>
  <body>
    <div class="container">
      <div class="page-header">
        <h1><i class="fas fa-list"></i> Gerenciar Itens</h1>
        <p>Adicione e organize os itens da sua lista de compras</p>
      </div>

      <!-- Formulário Novo Item -->
      <div class="card">
        <div class="card-header">
          <h2><i class="fas fa-plus-circle"></i> Novo Item</h2>
        </div>
        <div class="card-body">
          <form id="itemForm">
            <div class="input-group">
              <input
                type="text"
                id="itemNome"
                placeholder="Nome do item"
                maxlength="100"
                required
              />
              <select id="itemCategoria" required>
                <option value="">Selecione a categoria</option>
              </select>
              <input
                type="number"
                id="itemQuantidade"
                placeholder="Qtd"
                min="1"
                value="1"
                style="max-width: 100px"
              />
              <input
                type="number"
                id="itemValor"
                placeholder="Valor (R$)"
                step="0.01"
                min="0"
                value="0"
              />
              <button type="submit" class="btn btn-primary">
                <i class="fas fa-plus"></i> Adicionar
              </button>
            </div>
          </form>
        </div>
      </div>

      <!-- Filtros e Busca -->
      <div class="card">
        <div class="card-header">
          <h2><i class="fas fa-filter"></i> Filtros</h2>
          <button
            id="toggleThemeBtn"
            class="btn btn-outline"
            style="padding: 8px 16px"
          >
            <i class="fas fa-moon"></i>
          </button>
        </div>
        <div class="card-body">
          <div class="filters-container">
            <div class="search-box">
              <i class="fas fa-search"></i>
              <input
                type="search"
                id="searchInput"
                placeholder="Buscar itens..."
                autocomplete="off"
              />
            </div>
            <select id="categoriaFiltro">
              <option value="">Todas as categorias</option>
            </select>
            <select id="sortSelect">
              <option value="nome">Nome A-Z</option>
              <option value="nome-desc">Nome Z-A</option>
              <option value="valor">Menor preço</option>
              <option value="valor-desc">Maior preço</option>
            </select>
            <button id="clearCompradosBtn" class="btn btn-danger">
              <i class="fas fa-broom"></i> Limpar Comprados
            </button>
          </div>
        </div>
      </div>

      <!-- Lista de Itens -->
      <div class="card">
        <div class="card-header">
          <h2><i class="fas fa-shopping-basket"></i> Meus Itens</h2>
          <div class="header-stats">
            <span class="stat-badge"
              >Total: <strong id="totalItens">0</strong></span
            >
            <span class="stat-badge"
              >Comprados: <strong id="totalComprados">0</strong></span
            >
            <span class="stat-badge"
              >Valor: <strong id="totalValor">R$ 0,00</strong></span
            >
          </div>
        </div>
        <div class="card-body">
          <div id="itensList">
            <!-- Itens serão carregados aqui -->
          </div>
        </div>
      </div>
    </div>

    <!-- Modal Editar Item -->
    <div id="editModal" class="modal">
      <div class="modal-content">
        <button class="close" aria-label="Fechar">&times;</button>
        <h3><i class="fas fa-edit"></i> Editar Item</h3>
        <div class="form-group">
          <label class="form-label">Nome do Item</label>
          <input type="text" id="editItemNome" maxlength="100" />
        </div>
        <div class="form-group">
          <label class="form-label">Categoria</label>
          <select id="editItemCategoria"></select>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px">
          <div class="form-group">
            <label class="form-label">Quantidade</label>
            <input type="number" id="editItemQuantidade" min="1" value="1" />
          </div>
          <div class="form-group">
            <label class="form-label">Valor (R$)</label>
            <input type="number" id="editItemValor" step="0.01" min="0" />
          </div>
        </div>
        <div class="subtotal-display">
          Subtotal: <span id="editSubtotal">R$ 0,00</span>
        </div>
        <div class="modal-actions">
          <button id="saveBtn" class="btn btn-primary">
            <i class="fas fa-save"></i> Salvar
          </button>
          <button id="deleteBtn" class="btn btn-danger">
            <i class="fas fa-trash"></i> Excluir
          </button>
        </div>
      </div>
    </div>

    <script src="../polyfills.js"></script>
    <script src="../firebase-config.js"></script>
    <script src="../js/utils.js"></script>
    <script>
      let categorias = [];
      let itens = [];
      let itemEditando = null;
      let searchTerm = "";
      let categoriaFiltroSelecionada = "";
      let sortBy = "nome";

      document.addEventListener("DOMContentLoaded", function () {
        inicializarNavbar();
        inicializarTema();
        carregarCategorias();
        carregarItens();

        // Event Listeners
        document
          .getElementById("itemForm")
          .addEventListener("submit", adicionarItem);
        document
          .getElementById("toggleThemeBtn")
          .addEventListener("click", toggleTema);
        document
          .getElementById("searchInput")
          .addEventListener("input", debounce(aplicarFiltros, 300));
        document
          .getElementById("categoriaFiltro")
          .addEventListener("change", aplicarFiltros);
        document
          .getElementById("sortSelect")
          .addEventListener("change", aplicarFiltros);
        document
          .getElementById("clearCompradosBtn")
          .addEventListener("click", limparComprados);
        document.querySelector(".close").addEventListener("click", fecharModal);
        document
          .getElementById("saveBtn")
          .addEventListener("click", salvarEdicao);
        document
          .getElementById("deleteBtn")
          .addEventListener("click", excluirItem);
        document
          .getElementById("editItemQuantidade")
          .addEventListener("input", atualizarSubtotal);
        document
          .getElementById("editItemValor")
          .addEventListener("input", atualizarSubtotal);

        window.addEventListener("click", (e) => {
          if (e.target === document.getElementById("editModal")) {
            fecharModal();
          }
        });
      });

      function carregarCategorias() {
        if (!db) return;

        db.collection("categorias")
          .orderBy("nome")
          .onSnapshot((snapshot) => {
            categorias = [];
            snapshot.forEach((doc) => {
              categorias.push({ id: doc.id, ...doc.data() });
            });
            atualizarSelectCategorias();
          });
      }

      function atualizarSelectCategorias() {
        const selects = [
          document.getElementById("itemCategoria"),
          document.getElementById("editItemCategoria"),
          document.getElementById("categoriaFiltro"),
        ];

        selects.forEach((select, index) => {
          if (!select) return;

          const valorAtual = select.value;
          const opcoes = categorias
            .map(
              (cat) =>
                `<option value="${cat.id}">${sanitizeInput(cat.nome)}</option>`,
            )
            .join("");

          if (index === 2) {
            // Filtro
            select.innerHTML =
              '<option value="">Todas as categorias</option>' + opcoes;
          } else {
            select.innerHTML =
              '<option value="">Selecione a categoria</option>' + opcoes;
          }

          if (valorAtual) select.value = valorAtual;
        });
      }

      function carregarItens() {
        if (!db) return;

        db.collection("itens").onSnapshot((snapshot) => {
          itens = [];
          snapshot.forEach((doc) => {
            itens.push({ id: doc.id, ...doc.data() });
          });
          aplicarFiltros();
          atualizarEstatisticas();
        });
      }

      function aplicarFiltros() {
        searchTerm = document.getElementById("searchInput").value.toLowerCase();
        categoriaFiltroSelecionada =
          document.getElementById("categoriaFiltro").value;
        sortBy = document.getElementById("sortSelect").value;

        let itensFiltrados = [...itens];

        // Filtrar por busca
        if (searchTerm) {
          itensFiltrados = itensFiltrados.filter((item) =>
            item.nome.toLowerCase().includes(searchTerm),
          );
        }

        // Filtrar por categoria
        if (categoriaFiltroSelecionada) {
          itensFiltrados = itensFiltrados.filter(
            (item) => item.categoriaId === categoriaFiltroSelecionada,
          );
        }

        // Ordenar
        if (sortBy === "nome") {
          itensFiltrados.sort((a, b) => a.nome.localeCompare(b.nome));
        } else if (sortBy === "nome-desc") {
          itensFiltrados.sort((a, b) => b.nome.localeCompare(a.nome));
        } else if (sortBy === "valor") {
          itensFiltrados.sort((a, b) => (a.valor || 0) - (b.valor || 0));
        } else if (sortBy === "valor-desc") {
          itensFiltrados.sort((a, b) => (b.valor || 0) - (a.valor || 0));
        }

        renderizarItens(itensFiltrados);
      }

      function renderizarItens(itensParaRenderizar) {
        const container = document.getElementById("itensList");

        if (itensParaRenderizar.length === 0) {
          container.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-clipboard-list fa-3x"></i>
            <p>${searchTerm || categoriaFiltroSelecionada ? "Nenhum item encontrado" : "Nenhum item cadastrado ainda"}</p>
          </div>
        `;
          return;
        }

        container.innerHTML = itensParaRenderizar
          .map((item) => {
            const categoria = categorias.find((c) => c.id === item.categoriaId);
            const quantidade = item.quantidade || 1;
            const valor = item.valor || 0;
            const subtotal = quantidade * valor;

            return `
          <div class="item-card ${item.comprado ? "comprado" : ""}" data-id="${item.id}">
            <div class="item-checkbox">
              <input
                type="checkbox"
                ${item.comprado ? "checked" : ""}
                onchange="toggleComprado('${item.id}', this.checked)"
              >
            </div>
            <div class="item-content">
              <div class="item-nome">${sanitizeInput(item.nome)}</div>
              <div class="item-meta">
                <span class="badge badge-primary">
                  <i class="fas fa-tag"></i> ${categoria ? sanitizeInput(categoria.nome) : "Sem categoria"}
                </span>
                <span class="item-quantidade">Qtd: ${quantidade}</span>
              </div>
            </div>
            <div class="item-valor">
              ${formatarReal(subtotal)}
              ${quantidade > 1 ? `<small>(${formatarReal(valor)}/un)</small>` : ""}
            </div>
            <div class="item-actions">
              <button class="btn btn-secondary btn-icon" onclick="editarItem('${item.id}')" title="Editar">
                <i class="fas fa-edit"></i>
              </button>
            </div>
          </div>
        `;
          })
          .join("");
      }

      function atualizarEstatisticas() {
        const totalItens = itens.length;
        const totalComprados = itens.filter((item) => item.comprado).length;
        const totalValor = itens.reduce((total, item) => {
          const quantidade = item.quantidade || 1;
          const valor = item.valor || 0;
          return total + quantidade * valor;
        }, 0);

        document.getElementById("totalItens").textContent = totalItens;
        document.getElementById("totalComprados").textContent = totalComprados;
        document.getElementById("totalValor").textContent =
          formatarReal(totalValor);
      }

      async function adicionarItem(e) {
        e.preventDefault();

        const nome = document.getElementById("itemNome").value.trim();
        const categoriaId = document.getElementById("itemCategoria").value;
        const quantidade =
          parseInt(document.getElementById("itemQuantidade").value) || 1;
        const valor =
          parseFloat(document.getElementById("itemValor").value) || 0;

        if (!validateInput(nome, "text")) {
          mostrarToast(
            "Digite um nome válido (máx. 100 caracteres)",
            "warning",
          );
          return;
        }

        if (!categoriaId) {
          mostrarToast("Selecione uma categoria", "warning");
          return;
        }

        try {
          await db.collection("itens").add({
            nome: nome,
            categoriaId: categoriaId,
            quantidade: quantidade,
            valor: valor,
            comprado: false,
            dataCriacao: new Date().toISOString(),
          });

          document.getElementById("itemForm").reset();
          document.getElementById("itemQuantidade").value = 1;
          document.getElementById("itemValor").value = 0;
          mostrarToast("Item adicionado com sucesso!", "success");
        } catch (error) {
          console.error("Erro ao adicionar item:", error);
          mostrarToast("Erro ao adicionar item", "error");
        }
      }

      function editarItem(itemId) {
        itemEditando = itens.find((i) => i.id === itemId);
        if (!itemEditando) return;

        document.getElementById("editItemNome").value = itemEditando.nome;
        document.getElementById("editItemCategoria").value =
          itemEditando.categoriaId;
        document.getElementById("editItemQuantidade").value =
          itemEditando.quantidade || 1;
        document.getElementById("editItemValor").value =
          itemEditando.valor || 0;
        atualizarSubtotal();
        document.getElementById("editModal").classList.add("active");
      }

      function atualizarSubtotal() {
        const quantidade =
          parseInt(document.getElementById("editItemQuantidade").value) || 1;
        const valor =
          parseFloat(document.getElementById("editItemValor").value) || 0;
        const subtotal = quantidade * valor;
        document.getElementById("editSubtotal").textContent =
          formatarReal(subtotal);
      }

      async function salvarEdicao() {
        if (!itemEditando) return;

        const nome = document.getElementById("editItemNome").value.trim();
        const categoriaId = document.getElementById("editItemCategoria").value;
        const quantidade =
          parseInt(document.getElementById("editItemQuantidade").value) || 1;
        const valor =
          parseFloat(document.getElementById("editItemValor").value) || 0;

        if (!validateInput(nome, "text")) {
          mostrarToast(
            "Digite um nome válido (máx. 100 caracteres)",
            "warning",
          );
          return;
        }

        if (!categoriaId) {
          mostrarToast("Selecione uma categoria", "warning");
          return;
        }

        try {
          await db.collection("itens").doc(itemEditando.id).update({
            nome: nome,
            categoriaId: categoriaId,
            quantidade: quantidade,
            valor: valor,
          });

          mostrarToast("Item atualizado!", "success");
          fecharModal();
        } catch (error) {
          console.error("Erro ao atualizar item:", error);
          mostrarToast("Erro ao atualizar item", "error");
        }
      }

      async function excluirItem() {
        if (!itemEditando) return;

        if (!confirmarAcao("Tem certeza que deseja excluir este item?")) {
          return;
        }

        try {
          await db.collection("itens").doc(itemEditando.id).delete();
          mostrarToast("Item excluído!", "success");
          fecharModal();
        } catch (error) {
          console.error("Erro ao excluir item:", error);
          mostrarToast("Erro ao excluir item", "error");
        }
      }

      async function toggleComprado(itemId, comprado) {
        try {
          await db.collection("itens").doc(itemId).update({ comprado });
        } catch (error) {
          console.error("Erro ao atualizar item:", error);
          mostrarToast("Erro ao atualizar item", "error");
        }
      }

      async function limparComprados() {
        const comprados = itens.filter((item) => item.comprado);

        if (comprados.length === 0) {
          mostrarToast("Nenhum item comprado para limpar", "info");
          return;
        }

        if (
          !confirmarAcao(
            `Deseja remover ${comprados.length} item(ns) comprado(s)?`,
          )
        ) {
          return;
        }

        try {
          const batch = db.batch();
          comprados.forEach((item) => {
            batch.delete(db.collection("itens").doc(item.id));
          });
          await batch.commit();
          mostrarToast("Itens comprados removidos!", "success");
        } catch (error) {
          console.error("Erro ao limpar comprados:", error);
          mostrarToast("Erro ao limpar comprados", "error");
        }
      }

      function fecharModal() {
        document.getElementById("editModal").classList.remove("active");
        itemEditando = null;
      }
    </script>

    <style>
      .page-header {
        text-align: center;
        margin-bottom: 30px;
        padding: 40px 20px;
        background: rgba(255, 255, 255, 0.95);
        border-radius: 16px;
        box-shadow: var(--shadow-lg);
        animation: slideDown 0.5s ease-out;
      }

      .page-header h1 {
        font-size: 2.2rem;
        color: var(--dark-color);
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
      }

      .page-header h1 i {
        color: var(--primary-color);
      }

      .page-header p {
        color: var(--gray-darker);
        font-size: 1.1rem;
      }

      .filters-container {
        display: grid;
        grid-template-columns: 2fr 1fr 1fr auto;
        gap: 15px;
      }

      @media (max-width: 768px) {
        .filters-container {
          grid-template-columns: 1fr;
        }
      }

      .header-stats {
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
      }

      .stat-badge {
        padding: 8px 15px;
        background: rgba(16, 185, 129, 0.1);
        border-radius: 20px;
        font-size: 0.9rem;
        color: var(--primary-color);
      }

      .item-card {
        display: flex;
        align-items: center;
        gap: 15px;
        padding: 20px;
        background: rgba(255, 255, 255, 0.9);
        border-radius: 12px;
        margin-bottom: 12px;
        box-shadow: var(--shadow-sm);
        transition: var(--transition-fast);
        border: 2px solid transparent;
      }

      .item-card:hover {
        box-shadow: var(--shadow);
        border-color: var(--primary-color);
      }

      .item-card.comprado {
        opacity: 0.6;
      }

      .item-card.comprado .item-nome {
        text-decoration: line-through;
      }

      .item-checkbox input[type="checkbox"] {
        width: 24px;
        height: 24px;
        cursor: pointer;
      }

      .item-content {
        flex: 1;
      }

      .item-nome {
        font-size: 1.1rem;
        font-weight: 600;
        color: var(--dark-color);
        margin-bottom: 8px;
      }

      .item-meta {
        display: flex;
        gap: 12px;
        align-items: center;
      }

      .item-quantidade {
        font-size: 0.9rem;
        color: var(--gray-darker);
        font-weight: 500;
      }

      .item-valor {
        text-align: right;
        font-size: 1.3rem;
        font-weight: 700;
        color: var(--primary-color);
        min-width: 120px;
      }

      .item-valor small {
        display: block;
        font-size: 0.8rem;
        color: var(--gray-darker);
        font-weight: 400;
        margin-top: 4px;
      }

      .item-actions {
        display: flex;
        gap: 8px;
      }

      .subtotal-display {
        text-align: center;
        padding: 15px;
        background: var(--primary-light);
        border-radius: 8px;
        font-size: 1.2rem;
        font-weight: 600;
        color: var(--primary-color);
        margin: 15px 0;
      }

      body.dark-mode .page-header,
      body.dark-mode .item-card {
        background: rgba(45, 55, 72, 0.95);
      }

      body.dark-mode .page-header h1,
      body.dark-mode .item-nome {
        color: var(--light-color);
      }

      body.dark-mode .item-card:hover {
        background: rgba(55, 65, 81, 0.95);
      }

      body.dark-mode .subtotal-display {
        background: rgba(16, 185, 129, 0.2);
      }
    </style>
  </body>
</html>
