<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Visualize estatísticas e gráficos dos seus gastos"
    />
    <meta name="theme-color" content="#10b981" />
    <title>Estatísticas - Lista de Compras</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/navbar.css" />
    <link rel="stylesheet" href="../css/components.css" />

    <link rel="manifest" href="../manifest.json" />
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  </head>
  <body>
    <div class="container">
      <div class="page-header">
        <h1><i class="fas fa-chart-pie"></i> Estatísticas e Análises</h1>
        <p>Visualize seus gastos e acompanhe seu orçamento</p>
      </div>

      <!-- Stats Cards -->
      <div class="stats-grid">
        <div
          class="stat-card"
          style="background: linear-gradient(135deg, #10b981, #059669)"
        >
          <i class="fas fa-shopping-cart stat-card-icon"></i>
          <span class="stat-card-label">Total de Itens</span>
          <span class="stat-card-value" id="totalItens">0</span>
        </div>

        <div
          class="stat-card"
          style="background: linear-gradient(135deg, #3b82f6, #2563eb)"
        >
          <i class="fas fa-check-circle stat-card-icon"></i>
          <span class="stat-card-label">Comprados</span>
          <span class="stat-card-value" id="totalComprados">0</span>
        </div>

        <div
          class="stat-card"
          style="background: linear-gradient(135deg, #f59e0b, #d97706)"
        >
          <i class="fas fa-tags stat-card-icon"></i>
          <span class="stat-card-label">Categorias</span>
          <span class="stat-card-value" id="totalCategorias">0</span>
        </div>

        <div
          class="stat-card"
          style="background: linear-gradient(135deg, #8b5cf6, #7c3aed)"
        >
          <i class="fas fa-dollar-sign stat-card-icon"></i>
          <span class="stat-card-label">Total Gasto</span>
          <span class="stat-card-value" id="totalGasto">R$ 0,00</span>
        </div>
      </div>

      <!-- Gráficos -->
      <div class="grid grid-2">
        <div class="card">
          <div class="card-header">
            <h2><i class="fas fa-chart-pie"></i> Gastos por Categoria</h2>
            <button
              id="toggleThemeBtn"
              class="btn btn-outline"
              style="padding: 8px 16px"
            >
              <i class="fas fa-moon"></i>
            </button>
          </div>
          <div class="card-body">
            <canvas id="pieChart"></canvas>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <h2><i class="fas fa-chart-bar"></i> Comparativo</h2>
          </div>
          <div class="card-body">
            <canvas id="barChart"></canvas>
          </div>
        </div>
      </div>

      <!-- Ranking de Categorias -->
      <div class="card">
        <div class="card-header">
          <h2><i class="fas fa-trophy"></i> Ranking de Gastos por Categoria</h2>
        </div>
        <div class="card-body">
          <div id="rankingCategorias">
            <!-- Ranking será carregado aqui -->
          </div>
        </div>
      </div>

      <!-- Orçamento por Categoria -->
      <div class="card">
        <div class="card-header">
          <h2><i class="fas fa-piggy-bank"></i> Status de Orçamento</h2>
        </div>
        <div class="card-body">
          <div id="orcamentoStatus">
            <!-- Status será carregado aqui -->
          </div>
        </div>
      </div>
    </div>

    <script src="../polyfills.js"></script>
    <script src="../firebase-config.js"></script>
    <script src="../js/utils.js"></script>
    <script>
      let categorias = [];
      let itens = [];
      let pieChart = null;
      let barChart = null;

      document.addEventListener("DOMContentLoaded", function () {
        inicializarNavbar();
        inicializarTema();
        carregarDados();

        document
          .getElementById("toggleThemeBtn")
          .addEventListener("click", () => {
            toggleTema();
            // Recriar gráficos com tema atualizado
            setTimeout(() => {
              if (categorias.length > 0 && itens.length > 0) {
                criarGraficos();
              }
            }, 100);
          });
      });

      function carregarDados() {
        if (!db) {
          mostrarToast("Erro ao conectar com o banco de dados", "error");
          return;
        }

        // Carregar categorias
        db.collection("categorias").onSnapshot((snapshot) => {
          categorias = [];
          snapshot.forEach((doc) => {
            categorias.push({ id: doc.id, ...doc.data() });
          });
          processarDados();
        });

        // Carregar itens
        db.collection("itens").onSnapshot((snapshot) => {
          itens = [];
          snapshot.forEach((doc) => {
            itens.push({ id: doc.id, ...doc.data() });
          });
          processarDados();
        });
      }

      function processarDados() {
        if (categorias.length === 0 || itens.length === 0) return;

        atualizarEstatisticas();
        criarGraficos();
        criarRanking();
        criarStatusOrcamento();
      }

      function atualizarEstatisticas() {
        const totalItens = itens.length;
        const totalComprados = itens.filter((item) => item.comprado).length;
        const totalCategorias = categorias.length;
        const totalGasto = itens.reduce((total, item) => {
          const quantidade = item.quantidade || 1;
          const valor = item.valor || 0;
          return total + quantidade * valor;
        }, 0);

        document.getElementById("totalItens").textContent = totalItens;
        document.getElementById("totalComprados").textContent = totalComprados;
        document.getElementById("totalCategorias").textContent =
          totalCategorias;
        document.getElementById("totalGasto").textContent =
          formatarReal(totalGasto);
      }

      function criarGraficos() {
        const gastosPorCategoria = {};

        // Calcular gastos por categoria
        categorias.forEach((cat) => {
          gastosPorCategoria[cat.id] = {
            nome: cat.nome,
            total: 0,
          };
        });

        itens.forEach((item) => {
          if (gastosPorCategoria[item.categoriaId]) {
            const quantidade = item.quantidade || 1;
            const valor = item.valor || 0;
            gastosPorCategoria[item.categoriaId].total += quantidade * valor;
          }
        });

        const dados = Object.values(gastosPorCategoria).filter(
          (cat) => cat.total > 0,
        );
        const labels = dados.map((cat) => cat.nome);
        const valores = dados.map((cat) => cat.total);
        const cores = obterCoresGraficos(dados.length);

        const isDark = document.body.classList.contains("dark-mode");
        const textColor = isDark ? "#f9fafb" : "#1f2937";
        const gridColor = isDark
          ? "rgba(255, 255, 255, 0.1)"
          : "rgba(0, 0, 0, 0.1)";

        // Gráfico de Pizza
        const pieCtx = document.getElementById("pieChart");
        if (pieChart) pieChart.destroy();

        pieChart = new Chart(pieCtx, {
          type: "pie",
          data: {
            labels: labels,
            datasets: [
              {
                data: valores,
                backgroundColor: cores,
                borderWidth: 2,
                borderColor: isDark ? "#2d3748" : "#ffffff",
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: {
              legend: {
                position: "bottom",
                labels: {
                  color: textColor,
                  padding: 15,
                  font: { size: 12 },
                },
              },
              tooltip: {
                callbacks: {
                  label: function (context) {
                    const valor = context.parsed;
                    const total = context.dataset.data.reduce(
                      (a, b) => a + b,
                      0,
                    );
                    const percentual = ((valor / total) * 100).toFixed(1);
                    return `${context.label}: ${formatarReal(valor)} (${percentual}%)`;
                  },
                },
              },
            },
          },
        });

        // Gráfico de Barras
        const barCtx = document.getElementById("barChart");
        if (barChart) barChart.destroy();

        barChart = new Chart(barCtx, {
          type: "bar",
          data: {
            labels: labels,
            datasets: [
              {
                label: "Gastos por Categoria",
                data: valores,
                backgroundColor: cores,
                borderWidth: 0,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: {
              legend: {
                display: false,
              },
              tooltip: {
                callbacks: {
                  label: function (context) {
                    return `Gasto: ${formatarReal(context.parsed.y)}`;
                  },
                },
              },
            },
            scales: {
              y: {
                beginAtZero: true,
                ticks: {
                  color: textColor,
                  callback: function (value) {
                    return "R$ " + value.toFixed(0);
                  },
                },
                grid: {
                  color: gridColor,
                },
              },
              x: {
                ticks: {
                  color: textColor,
                },
                grid: {
                  display: false,
                },
              },
            },
          },
        });
      }

      function criarRanking() {
        const gastosPorCategoria = {};

        categorias.forEach((cat) => {
          gastosPorCategoria[cat.id] = {
            nome: cat.nome,
            total: 0,
            itens: 0,
          };
        });

        itens.forEach((item) => {
          if (gastosPorCategoria[item.categoriaId]) {
            const quantidade = item.quantidade || 1;
            const valor = item.valor || 0;
            gastosPorCategoria[item.categoriaId].total += quantidade * valor;
            gastosPorCategoria[item.categoriaId].itens++;
          }
        });

        const ranking = Object.values(gastosPorCategoria)
          .filter((cat) => cat.total > 0)
          .sort((a, b) => b.total - a.total);

        const container = document.getElementById("rankingCategorias");

        if (ranking.length === 0) {
          container.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-chart-line fa-2x"></i>
            <p>Nenhum gasto registrado ainda</p>
          </div>
        `;
          return;
        }

        const totalGeral = ranking.reduce((sum, cat) => sum + cat.total, 0);

        container.innerHTML = ranking
          .map((cat, index) => {
            const percentual = ((cat.total / totalGeral) * 100).toFixed(1);
            const medalha =
              index === 0 ? "🥇" : index === 1 ? "🥈" : index === 2 ? "🥉" : "";

            return `
          <div class="ranking-item">
            <div class="ranking-position">${medalha} #${index + 1}</div>
            <div class="ranking-info">
              <div class="ranking-nome">${sanitizeInput(cat.nome)}</div>
              <div class="ranking-meta">${cat.itens} itens • ${percentual}% do total</div>
            </div>
            <div class="ranking-valor">${formatarReal(cat.total)}</div>
          </div>
        `;
          })
          .join("");
      }

      function criarStatusOrcamento() {
        const container = document.getElementById("orcamentoStatus");

        const categoriasComOrcamento = categorias.filter(
          (cat) => cat.orcamento > 0,
        );

        if (categoriasComOrcamento.length === 0) {
          container.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-piggy-bank fa-2x"></i>
            <p>Nenhuma categoria possui orçamento definido</p>
          </div>
        `;
          return;
        }

        const statusList = categoriasComOrcamento.map((cat) => {
          const itensCategoria = itens.filter(
            (item) => item.categoriaId === cat.id,
          );
          const totalGasto = itensCategoria.reduce((total, item) => {
            const quantidade = item.quantidade || 1;
            const valor = item.valor || 0;
            return total + quantidade * valor;
          }, 0);

          const orcamento = cat.orcamento || 0;
          const percentual = orcamento > 0 ? (totalGasto / orcamento) * 100 : 0;
          const disponivel = Math.max(0, orcamento - totalGasto);

          let statusClass = "";
          let statusText = "";
          let statusIcon = "";

          if (percentual >= 100) {
            statusClass = "danger";
            statusText = "Orçamento excedido";
            statusIcon = "exclamation-circle";
          } else if (percentual >= 80) {
            statusClass = "warning";
            statusText = "Atenção ao limite";
            statusIcon = "exclamation-triangle";
          } else {
            statusClass = "success";
            statusText = "Dentro do orçamento";
            statusIcon = "check-circle";
          }

          return {
            nome: cat.nome,
            orcamento,
            totalGasto,
            disponivel,
            percentual,
            statusClass,
            statusText,
            statusIcon,
          };
        });

        container.innerHTML = statusList
          .map(
            (status) => `
        <div class="orcamento-card">
          <div class="orcamento-header">
            <h3>${sanitizeInput(status.nome)}</h3>
            <span class="badge badge-${status.statusClass}">
              <i class="fas fa-${status.statusIcon}"></i> ${status.statusText}
            </span>
          </div>
          <div class="orcamento-body">
            <div class="orcamento-valores">
              <div class="orcamento-item">
                <span>Orçamento:</span>
                <strong>${formatarReal(status.orcamento)}</strong>
              </div>
              <div class="orcamento-item">
                <span>Gasto:</span>
                <strong>${formatarReal(status.totalGasto)}</strong>
              </div>
              <div class="orcamento-item">
                <span>Disponível:</span>
                <strong class="text-${status.disponivel > 0 ? "success" : "danger"}">
                  ${formatarReal(status.disponivel)}
                </strong>
              </div>
            </div>
            <div class="progress-bar-container">
              <div class="progress-bar ${status.statusClass}" style="width: ${Math.min(status.percentual, 100)}%"></div>
            </div>
            <div class="progress-text">${status.percentual.toFixed(1)}% utilizado</div>
          </div>
        </div>
      `,
          )
          .join("");
      }
    </script>

    <style>
      .page-header {
        text-align: center;
        margin-bottom: 30px;
        padding: 40px 20px;
        background: rgba(255, 255, 255, 0.95);
        border-radius: 16px;
        box-shadow: var(--shadow-lg);
        animation: slideDown 0.5s ease-out;
      }

      .page-header h1 {
        font-size: 2.2rem;
        color: var(--dark-color);
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
      }

      .page-header h1 i {
        color: var(--primary-color);
      }

      .page-header p {
        color: var(--gray-darker);
        font-size: 1.1rem;
      }

      .ranking-item {
        display: flex;
        align-items: center;
        gap: 20px;
        padding: 20px;
        background: rgba(255, 255, 255, 0.6);
        border-radius: 12px;
        margin-bottom: 12px;
        transition: var(--transition-fast);
        border: 2px solid transparent;
      }

      .ranking-item:hover {
        background: white;
        box-shadow: var(--shadow);
        border-color: var(--primary-color);
      }

      .ranking-position {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--primary-color);
        min-width: 60px;
        text-align: center;
      }

      .ranking-info {
        flex: 1;
      }

      .ranking-nome {
        font-size: 1.2rem;
        font-weight: 600;
        color: var(--dark-color);
        margin-bottom: 5px;
      }

      .ranking-meta {
        font-size: 0.9rem;
        color: var(--gray-darker);
      }

      .ranking-valor {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--primary-color);
      }

      .orcamento-card {
        background: rgba(255, 255, 255, 0.7);
        border-radius: 12px;
        padding: 25px;
        margin-bottom: 20px;
        box-shadow: var(--shadow-sm);
        transition: var(--transition-fast);
      }

      .orcamento-card:hover {
        box-shadow: var(--shadow);
      }

      .orcamento-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        padding-bottom: 15px;
        border-bottom: 2px solid var(--gray-color);
      }

      .orcamento-header h3 {
        font-size: 1.3rem;
        color: var(--dark-color);
        margin: 0;
      }

      .orcamento-valores {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 15px;
        margin-bottom: 15px;
      }

      .orcamento-item {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }

      .orcamento-item span {
        font-size: 0.9rem;
        color: var(--gray-darker);
      }

      .orcamento-item strong {
        font-size: 1.1rem;
        color: var(--dark-color);
      }

      .progress-text {
        text-align: center;
        margin-top: 10px;
        font-weight: 600;
        color: var(--gray-darker);
      }

      body.dark-mode .page-header,
      body.dark-mode .ranking-item,
      body.dark-mode .orcamento-card {
        background: rgba(45, 55, 72, 0.95);
      }

      body.dark-mode .page-header h1,
      body.dark-mode .ranking-nome,
      body.dark-mode .orcamento-header h3,
      body.dark-mode .orcamento-item strong {
        color: var(--light-color);
      }

      body.dark-mode .ranking-item:hover {
        background: rgba(55, 65, 81, 0.95);
      }

      @media (max-width: 768px) {
        .orcamento-valores {
          grid-template-columns: 1fr;
        }

        .ranking-item {
          flex-direction: column;
          text-align: center;
        }
      }
    </style>
  </body>
</html>
