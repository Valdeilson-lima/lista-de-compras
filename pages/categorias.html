<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Gerencie suas categorias de compras" />
    <meta name="theme-color" content="#10b981" />
    <title>Categorias - Lista de Compras</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/navbar.css" />
    <link rel="stylesheet" href="../css/components.css" />

    <link rel="manifest" href="../manifest.json" />
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  </head>
  <body>
    <div class="container">
      <div class="page-header">
        <h1><i class="fas fa-tags"></i> Gerenciar Categorias</h1>
        <p>Organize suas compras em categorias com controle de orçamento</p>
      </div>

      <!-- Formulário Nova Categoria -->
      <div class="card">
        <div class="card-header">
          <h2><i class="fas fa-plus-circle"></i> Nova Categoria</h2>
        </div>
        <div class="card-body">
          <form id="categoriaForm">
            <div class="input-group">
              <input
                type="text"
                id="categoriaNome"
                placeholder="Nome da categoria (ex: Cereais, Laticínios)"
                maxlength="50"
                required
              />
              <input
                type="number"
                id="categoriaOrcamento"
                placeholder="Orçamento (R$) - opcional"
                step="0.01"
                min="0"
              />
              <button type="submit" class="btn btn-primary">
                <i class="fas fa-plus"></i> Adicionar
              </button>
            </div>
          </form>
        </div>
      </div>

      <!-- Lista de Categorias -->
      <div class="card">
        <div class="card-header">
          <h2><i class="fas fa-list"></i> Minhas Categorias</h2>
          <button
            id="toggleThemeBtn"
            class="btn btn-outline"
            style="padding: 8px 16px"
          >
            <i class="fas fa-moon"></i>
          </button>
        </div>
        <div class="card-body">
          <div id="categoriasList" class="grid grid-3">
            <!-- Categorias serão carregadas aqui -->
          </div>
        </div>
      </div>
    </div>

    <!-- Modal Editar Categoria -->
    <div id="editModal" class="modal">
      <div class="modal-content">
        <button class="close" aria-label="Fechar">&times;</button>
        <h3><i class="fas fa-edit"></i> Editar Categoria</h3>
        <div class="form-group">
          <label class="form-label">Nome da Categoria</label>
          <input
            type="text"
            id="editCategoriaNome"
            placeholder="Nome da categoria"
            maxlength="50"
          />
        </div>
        <div class="form-group">
          <label class="form-label">Orçamento Mensal (R$)</label>
          <input
            type="number"
            id="editCategoriaOrcamento"
            placeholder="0.00"
            step="0.01"
            min="0"
          />
        </div>
        <div class="modal-actions">
          <button id="saveBtn" class="btn btn-primary">
            <i class="fas fa-save"></i> Salvar
          </button>
          <button id="deleteBtn" class="btn btn-danger">
            <i class="fas fa-trash"></i> Excluir
          </button>
        </div>
      </div>
    </div>

    <script src="../polyfills.js"></script>
    <script src="../firebase-config.js"></script>
    <script src="../js/utils.js"></script>
    <script>
      let categorias = [];
      let categoriaEditando = null;

      document.addEventListener("DOMContentLoaded", function () {
        inicializarNavbar();
        inicializarTema();
        carregarCategorias();

        // Event Listeners
        document
          .getElementById("categoriaForm")
          .addEventListener("submit", adicionarCategoria);
        document
          .getElementById("toggleThemeBtn")
          .addEventListener("click", toggleTema);
        document.querySelector(".close").addEventListener("click", fecharModal);
        document
          .getElementById("saveBtn")
          .addEventListener("click", salvarEdicao);
        document
          .getElementById("deleteBtn")
          .addEventListener("click", excluirCategoria);

        window.addEventListener("click", (e) => {
          if (e.target === document.getElementById("editModal")) {
            fecharModal();
          }
        });
      });

      function carregarCategorias() {
        if (!db) {
          mostrarToast("Erro ao conectar com o banco de dados", "error");
          return;
        }

        db.collection("categorias")
          .orderBy("nome")
          .onSnapshot(
            (snapshot) => {
              categorias = [];
              snapshot.forEach((doc) => {
                categorias.push({ id: doc.id, ...doc.data() });
              });
              renderizarCategorias();
            },
            (error) => {
              console.error("Erro ao carregar categorias:", error);
              mostrarToast("Erro ao carregar categorias", "error");
            },
          );
      }

      function renderizarCategorias() {
        const container = document.getElementById("categoriasList");

        if (categorias.length === 0) {
          container.innerHTML = `
          <div class="empty-state" style="grid-column: 1 / -1;">
            <i class="fas fa-folder-open fa-3x"></i>
            <p>Nenhuma categoria cadastrada ainda</p>
          </div>
        `;
          return;
        }

        // Calcular total de itens por categoria
        const itensPromises = categorias.map((cat) =>
          db.collection("itens").where("categoriaId", "==", cat.id).get(),
        );

        Promise.all(itensPromises).then((results) => {
          container.innerHTML = categorias
            .map((cat, index) => {
              const itensSnapshot = results[index];
              let totalItens = 0;
              let totalGasto = 0;

              itensSnapshot.forEach((doc) => {
                const item = doc.data();
                totalItens++;
                const quantidade = item.quantidade || 1;
                const valor = parseFloat(item.valor) || 0;
                totalGasto += valor * quantidade;
              });

              const orcamento = cat.orcamento || 0;
              const percentual =
                orcamento > 0 ? (totalGasto / orcamento) * 100 : 0;
              let barClass = "";
              if (percentual >= 100) barClass = "danger";
              else if (percentual >= 80) barClass = "warning";

              return `
            <div class="categoria-card" data-id="${cat.id}">
              <div class="categoria-header">
                <i class="fas fa-tag"></i>
                <h3>${sanitizeInput(cat.nome)}</h3>
              </div>
              <div class="categoria-info">
                <div class="info-item">
                  <span class="info-label">Itens:</span>
                  <span class="info-value">${totalItens}</span>
                </div>
                <div class="info-item">
                  <span class="info-label">Gasto:</span>
                  <span class="info-value">${formatarReal(totalGasto)}</span>
                </div>
                ${
                  orcamento > 0
                    ? `
                  <div class="info-item">
                    <span class="info-label">Orçamento:</span>
                    <span class="info-value">${formatarReal(orcamento)}</span>
                  </div>
                  <div class="progress-bar-container">
                    <div class="progress-bar ${barClass}" style="width: ${Math.min(percentual, 100)}%"></div>
                  </div>
                  <div class="percentual-text">${percentual.toFixed(0)}% utilizado</div>
                `
                    : ""
                }
              </div>
              <div class="categoria-actions">
                <button class="btn btn-secondary btn-icon" onclick="editarCategoria('${cat.id}')" title="Editar">
                  <i class="fas fa-edit"></i>
                </button>
              </div>
            </div>
          `;
            })
            .join("");
        });
      }

      async function adicionarCategoria(e) {
        e.preventDefault();

        const nome = document.getElementById("categoriaNome").value.trim();
        const orcamento =
          parseFloat(document.getElementById("categoriaOrcamento").value) || 0;

        if (!validateInput(nome, "categoria")) {
          mostrarToast("Digite um nome válido (máx. 50 caracteres)", "warning");
          return;
        }

        try {
          await db.collection("categorias").add({
            nome: nome,
            orcamento: orcamento,
            dataCriacao: new Date().toISOString(),
          });

          document.getElementById("categoriaForm").reset();
          mostrarToast("Categoria adicionada com sucesso!", "success");
        } catch (error) {
          console.error("Erro ao adicionar categoria:", error);
          mostrarToast("Erro ao adicionar categoria", "error");
        }
      }

      function editarCategoria(categoriaId) {
        categoriaEditando = categorias.find((c) => c.id === categoriaId);
        if (!categoriaEditando) return;

        document.getElementById("editCategoriaNome").value =
          categoriaEditando.nome;
        document.getElementById("editCategoriaOrcamento").value =
          categoriaEditando.orcamento || "";
        document.getElementById("editModal").classList.add("active");
      }

      async function salvarEdicao() {
        if (!categoriaEditando) return;

        const nome = document.getElementById("editCategoriaNome").value.trim();
        const orcamento =
          parseFloat(document.getElementById("editCategoriaOrcamento").value) ||
          0;

        if (!validateInput(nome, "categoria")) {
          mostrarToast("Digite um nome válido (máx. 50 caracteres)", "warning");
          return;
        }

        try {
          await db.collection("categorias").doc(categoriaEditando.id).update({
            nome: nome,
            orcamento: orcamento,
          });

          mostrarToast("Categoria atualizada!", "success");
          fecharModal();
        } catch (error) {
          console.error("Erro ao atualizar categoria:", error);
          mostrarToast("Erro ao atualizar categoria", "error");
        }
      }

      async function excluirCategoria() {
        if (!categoriaEditando) return;

        if (
          !confirmarAcao(
            "Tem certeza que deseja excluir esta categoria? Todos os itens vinculados também serão excluídos.",
          )
        ) {
          return;
        }

        try {
          // Excluir itens da categoria
          const itens = await db
            .collection("itens")
            .where("categoriaId", "==", categoriaEditando.id)
            .get();
          const batch = db.batch();
          itens.forEach((doc) => batch.delete(doc.ref));
          await batch.commit();

          // Excluir categoria
          await db.collection("categorias").doc(categoriaEditando.id).delete();

          mostrarToast("Categoria excluída!", "success");
          fecharModal();
        } catch (error) {
          console.error("Erro ao excluir categoria:", error);
          mostrarToast("Erro ao excluir categoria", "error");
        }
      }

      function fecharModal() {
        document.getElementById("editModal").classList.remove("active");
        categoriaEditando = null;
      }
    </script>

    <style>
      .page-header {
        text-align: center;
        margin-bottom: 30px;
        padding: 40px 20px;
        background: rgba(255, 255, 255, 0.95);
        border-radius: 16px;
        box-shadow: var(--shadow-lg);
        animation: slideDown 0.5s ease-out;
      }

      .page-header h1 {
        font-size: 2.2rem;
        color: var(--dark-color);
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
      }

      .page-header h1 i {
        color: var(--primary-color);
      }

      .page-header p {
        color: var(--gray-darker);
        font-size: 1.1rem;
      }

      .categoria-card {
        background: rgba(255, 255, 255, 0.9);
        border-radius: 12px;
        padding: 25px;
        box-shadow: var(--shadow);
        transition: var(--transition-fast);
        border: 2px solid transparent;
      }

      .categoria-card:hover {
        transform: translateY(-5px);
        box-shadow: var(--shadow-lg);
        border-color: var(--primary-color);
      }

      .categoria-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
        padding-bottom: 15px;
        border-bottom: 2px solid var(--gray-color);
      }

      .categoria-header i {
        font-size: 1.8rem;
        color: var(--primary-color);
      }

      .categoria-header h3 {
        font-size: 1.3rem;
        color: var(--dark-color);
        margin: 0;
      }

      .categoria-info {
        margin-bottom: 20px;
      }

      .info-item {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
      }

      .info-label {
        color: var(--gray-darker);
        font-weight: 500;
      }

      .info-value {
        color: var(--dark-color);
        font-weight: 700;
      }

      .percentual-text {
        text-align: center;
        margin-top: 8px;
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--gray-darker);
      }

      .categoria-actions {
        display: flex;
        justify-content: center;
      }

      body.dark-mode .page-header,
      body.dark-mode .categoria-card {
        background: rgba(45, 55, 72, 0.95);
      }

      body.dark-mode .page-header h1,
      body.dark-mode .categoria-header h3,
      body.dark-mode .info-value {
        color: var(--light-color);
      }

      body.dark-mode .categoria-card:hover {
        background: rgba(55, 65, 81, 0.95);
      }
    </style>
  </body>
</html>
